<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Υπό Κατασκευή | Σύντομα Κοντά σας</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        .logo {
            font-size: 3rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #34495e;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #7f8c8d;
        }

        /* Απλό animation για το "loading" */
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 2s linear infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .contact-info {
            font-size: 0.9rem;
            color: #95a5a6;
        }

        .contact-info a {
            color: #3498db;
            text-decoration: none;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">LOGO</div>
        <div class="loader"></div>
        <h1>Η ιστοσελίδα μας ετοιμάζεται!</h1>
        <p>Εργαζόμαστε σκληρά για να σας προσφέρουμε μια μοναδική εμπειρία. Μείνετε συντονισμένοι, θα είμαστε σύντομα κοντά σας.</p>
        
        <div class="contact-info">
            Χρειάζεστε κάτι επείγον; <br>
            Επικοινωνήστε μαζί μας στο: <a href="mailto:welcome@anapnoi.gr">info@example.com</a>
        </div>
    </div>

</body>
</html>
